# 株価・財務データの定期更新
# 平日 16:30 JST（東証の大引け後）に Yahoo Finance から取得し、
# public/market/market.json を更新してコミット → Pages が自動再デプロイされる
name: Update market data

on:
  schedule:
    - cron: "30 7 * * 1-5" # 07:30 UTC = 16:30 JST 平日
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch market data from Yahoo Finance
        run: npm run fetch-market

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/market/market.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: 市場データを更新 ($(date -u +%Y-%m-%d))"
            git push
          fi
